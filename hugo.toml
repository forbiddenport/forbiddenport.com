baseURL = "https://forbiddenport.com/"
languageCode = "en-us"
title = "forbiddenport"
enableRobotsTXT = true
disableHugoGeneratorInject = true

theme = "fixed-measure"

[params]
  author = "forbiddenport"
  role = "Red Team Operator"
  description = "Penetration testing, vulnerability research, red teaming, and the occasional tool."
  # Shown in the footer next to the year
  footerNote = ""

[params.social]
  # Only keys set to a non-empty value render in the footer. Swap the
  # placeholder values below for your real handles, or set to "" to hide.
  # To add more (email, mastodon, etc.), add a key here and wire it in
  # themes/minimal/layouts/partials/footer.html.
  github   = "forbiddenport"
  linkedin = "yourhandle"

[menu]
  [[menu.main]]
    name = "posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    name = "projects"
    url = "/projects/"
    weight = 20
  [[menu.main]]
    name = "about"
    url = "/about/"
    weight = 30

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    lineNos = false
    tabWidth = 2
    guessSyntax = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[pagination]
  pagerSize = 20
