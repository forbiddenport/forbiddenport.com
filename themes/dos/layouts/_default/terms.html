{{ define "main" }}
<section class="panel">
  <div class="panel-label">{{ .Title }}</div>
  <div class="panel-tag">tags\</div>
  <div class="panel-body">
    <ul class="tag-list">
      {{- range .Data.Terms.ByCount }}
        <li>
          <a href="{{ .Page.RelPermalink }}">{{ .Name }}</a>
          <span class="count">({{ .Count }})</span>
        </li>
      {{- end }}
    </ul>
  </div>
</section>
{{ end }}
